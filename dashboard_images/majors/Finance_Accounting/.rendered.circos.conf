karyotype = karyotype.txt
chromosomes_units = 1
chromosomes_display_default = yes

<image>
dir   = .
file  = Finance_Accounting.png
png   = yes
svg   = yes
radius         = 2000p
background     = white
angle_offset   = -90
auto_alpha_colors = yes
auto_alpha_steps  = 5
</image>

<ideogram>
  <spacing>
    default = 0.004r
  </spacing>

  radius           = 0.84r
  thickness        = 38p
  fill             = yes
  stroke_color     = white
  stroke_thickness = 2p

  show_label       = yes
  label_font       = default
  label_radius     = 1.04r
  label_size       = 28
  label_parallel   = no
</ideogram>

show_ticks       = no
show_tick_labels = no

<links>
  <link>
    file          = links.txt
    radius        = 0.99r
    bezier_radius = 0.15r
    thickness     = 1
    ribbon        = yes
    flat          = yes
  </link>
</links>

